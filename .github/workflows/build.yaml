name: Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        rid: [ win-x64, win-arm64 ]

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore src/DocumentTranslator.csproj -r ${{ matrix.rid }}

      - name: Compute version
        id: version
        shell: pwsh
        run: |
          $version = "0.1.0.$($env:GITHUB_RUN_NUMBER)"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $version"

      - name: Publish single-file exe (${{ matrix.rid }})
        run: >
          dotnet publish src/DocumentTranslator.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained false
          -p:PublishSingleFile=true
          -p:DebugType=embedded
          -p:Version=${{ steps.version.outputs.version }}
          --output publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: DocumentTranslator-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}/DocumentTranslator.exe

  release:
    name: Tag and Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && contains(github.event.head_commit.message, '[release]')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Stage release assets
        shell: bash
        run: |
          mkdir -p release
          cp artifacts/DocumentTranslator-win-x64/DocumentTranslator.exe   release/DocumentTranslator-win-x64.exe
          cp artifacts/DocumentTranslator-win-arm64/DocumentTranslator.exe release/DocumentTranslator-win-arm64.exe
          ls -la release

      - name: Create tag and GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: v${{ needs.build.outputs.version }}
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
